  ul { padding-left: 1.3rem; }
  li { margin-bottom: 0.5rem; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .index-list { list-style: none; padding: 0; }
  .index-list li { border-bottom: 1px solid var(--border); padding: 0.9rem 0; }
  .index-list .date { color: var(--muted); font-size: 0.85rem; display: block; margin-bottom: 0.2rem; }
  footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 1px solid var(--border);
